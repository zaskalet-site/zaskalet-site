<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#080a0d">
  <title>Mikhail Zaskalet — Digital Contact Card</title>
  <meta name="description" content="Privacy-first digital contact card for Mikhail Zaskalet.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="card" aria-labelledby="name">
      <header>
        <div class="logo" aria-hidden="true">MZ</div>
        <p class="eyebrow">DIGITAL CONTACT CARD</p>
        <h1 id="name">Mikhail Zaskalet</h1>
        <p class="role">Technology Entrepreneur</p>
        <p class="intro">AI systems, telecommunications solutions, and technology.</p>
      </header>

      <section id="categoryScreen">
        <h2>How do you know me?</h2>
        <div class="choices" role="group" aria-label="How do you know me?">
          <button type="button" data-category="business">💼 <span>Business</span></button>
          <button type="button" data-category="interests">🎯 <span>Interests</span></button>
          <button type="button" data-category="radio">📡 <span>Amateur Radio</span></button>
          <button type="button" data-category="gaming">🎮 <span>Gaming</span></button>
          <button type="button" data-category="personal">🤝 <span>Personal</span></button>
          <button type="button" data-category="other">✉ <span>Other</span></button>
        </div>
      </section>

      <section id="contactScreen" class="hidden" aria-live="polite">
        <div class="section-heading">
          <div>
            <p id="categoryKicker" class="kicker"></p>
            <h2 id="categoryTitle">Connect</h2>
          </div>
          <button id="backButton" class="back-button" type="button" aria-label="Back">←</button>
        </div>

        <p id="categoryDescription" class="context-message"></p>
        <div id="identityFacts" class="facts hidden"></div>
        <div id="contactLinks" class="contact-links"></div>

        <a class="save-contact" href="mikhail-zaskalet.vcf" download>
          <span>Save contact</span><span aria-hidden="true">↓</span>
        </a>
      </section>

      <p class="privacy">Personal contact information is shared after we connect.</p>
      <footer>© 2026 Mikhail Zaskalet</footer>
    </section>
  </main>

  <script src="contacts.js"></script>
  <script src="script.js"></script>
</body>
</html>
